name: Build Dashboard

on:
  schedule:
    - cron: '0 12,20 * * *'   # 12:00 and 20:00 UTC (8am and 4pm EST)
  workflow_dispatch:            # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Check secrets are set
        env:
          GHL_TOKEN_AXISKEY: ${{ secrets.GHL_TOKEN_AXISKEY }}
          GHL_LOCATION_ID_AXISKEY: ${{ secrets.GHL_LOCATION_ID_AXISKEY }}
          META_TOKEN_AXISKEY: ${{ secrets.META_TOKEN_AXISKEY }}
        run: |
          if [ -z "$GHL_TOKEN_AXISKEY" ]; then echo "ERROR: GHL_TOKEN_AXISKEY is empty"; else echo "OK: GHL_TOKEN_AXISKEY is set (${#GHL_TOKEN_AXISKEY} chars)"; fi
          if [ -z "$GHL_LOCATION_ID_AXISKEY" ]; then echo "ERROR: GHL_LOCATION_ID_AXISKEY is empty"; else echo "OK: GHL_LOCATION_ID_AXISKEY is set (${#GHL_LOCATION_ID_AXISKEY} chars)"; fi
          if [ -z "$META_TOKEN_AXISKEY" ]; then echo "ERROR: META_TOKEN_AXISKEY is empty"; else echo "OK: META_TOKEN_AXISKEY is set (${#META_TOKEN_AXISKEY} chars)"; fi

      - name: Build dashboard
        env:
          GHL_TOKEN_AXISKEY: ${{ secrets.GHL_TOKEN_AXISKEY }}
          GHL_LOCATION_ID_AXISKEY: ${{ secrets.GHL_LOCATION_ID_AXISKEY }}
          META_TOKEN_AXISKEY: ${{ secrets.META_TOKEN_AXISKEY }}
        run: python3 build_dashboard.py

      - name: Commit daily snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/*.json
          git diff --staged --quiet || git commit -m "Auto-update daily snapshots [skip ci]"
          git push

      - name: Prepare publish folder
        run: |
          mkdir -p dist
          cp axis-growth.html dist/index.html
          cp axis-growth-data.html dist/
          cp -r assets dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
